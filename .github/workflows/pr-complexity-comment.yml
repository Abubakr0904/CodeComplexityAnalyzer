name: PR Complexity Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Run cca and capture JSON
        id: analyze
        run: |
          set -e
          dotnet run --project src/CodeComplexityAnalyzer.Cli -- src --format json > findings.json || true
          cat findings.json | head -2

      - name: Build comment markdown
        id: build-comment
        run: |
          python3 - <<'PY'
          import json, os, pathlib

          data = json.loads(pathlib.Path("findings.json").read_text())
          findings = data.get("findings", [])
          files_analyzed = data.get("filesAnalyzed", 0)
          methods_analyzed = data.get("methodsAnalyzed", 0)

          if not findings:
              body = (
                  "## \U0001f7e2 Code complexity check\n\n"
                  f"✅ No code complexity findings across {files_analyzed} files / {methods_analyzed} methods.\n"
              )
          else:
              errors = [f for f in findings if f["severity"] == "error"]
              warnings = [f for f in findings if f["severity"] == "warning"]
              top = sorted(findings, key=lambda f: (0 if f["severity"] == "error" else 1, -f["value"]))[:20]

              lines = [
                  "## \U0001f4ca Code complexity check",
                  "",
                  f"- {len(errors)} error(s), {len(warnings)} warning(s)",
                  f"- {files_analyzed} files / {methods_analyzed} methods analyzed",
                  "",
                  "<details><summary>Top findings (up to 20)</summary>",
                  "",
                  "| Severity | Metric | File | Line | Method | Value | Threshold |",
                  "| --- | --- | --- | --- | --- | --- | --- |",
              ]
              icons = {"error": "\U0001f534", "warning": "\U0001f7e1"}
              for f in top:
                  lines.append(
                      f"| {icons[f['severity']]} {f['severity']} | "
                      f"{f['metricType']} | "
                      f"`{f['filePath']}` | "
                      f"{f['lineNumber']} | "
                      f"`{f['methodName']}` | "
                      f"{f['value']} | "
                      f"{f['threshold']} |"
                  )
              if len(findings) > 20:
                  lines.append("")
                  lines.append(f"_…and {len(findings) - 20} more finding(s)._")
              lines.append("")
              lines.append("</details>")
              body = "\n".join(lines)

          pathlib.Path("comment.md").write_text(body)
          delim = "ENDCOMMENTBODY"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<{delim}\n{body}\n{delim}\n")
          PY

      - name: Post or update sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cca-complexity
          message: ${{ steps.build-comment.outputs.body }}
