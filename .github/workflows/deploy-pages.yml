name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to deploy from (must be main)"
        default: main
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish Blazor WASM
        run: |
          dotnet publish src/CodeComplexityAnalyzer.Web/CodeComplexityAnalyzer.Web.csproj \
            --configuration Release \
            --output publish

      - name: Rewrite base href for repo subpath
        run: |
          sed -i 's|<base href="/" />|<base href="/CodeComplexityAnalyzer/" />|g' \
            publish/wwwroot/index.html

      - name: Stamp service worker cache version with commit SHA
        run: |
          sed -i "s|__CCA_BUILD_HASH__|${GITHUB_SHA}|g" \
            publish/wwwroot/service-worker.js

      - name: Add .nojekyll so _framework folder is served
        run: touch publish/wwwroot/.nojekyll

      - name: Copy index.html as 404.html for SPA deep links
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ref == 'main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
