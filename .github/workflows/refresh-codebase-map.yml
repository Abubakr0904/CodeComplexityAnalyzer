# Auto-refreshes docs/CODEBASE_MAP.md whenever main moves.
#
# DEMO MODE: this workflow is a structural placeholder.
# Until ANTHROPIC_API_KEY is set in repo secrets, the refresh step
# is skipped (it logs a warning instead of failing).
#
# To enable for real:
#   1. Settings → Secrets and variables → Actions → New repository secret
#      Name: ANTHROPIC_API_KEY
#      Value: an Anthropic API key with budget for Cartographer runs
#   2. Push something to main, or run this workflow manually.
#   3. The action runs `/cartographer`, then `peter-evans/create-pull-request`
#      opens a follow-up PR if docs/CODEBASE_MAP.md or CLAUDE.md changed.
#
# Cost note: Cartographer dispatches parallel Sonnet subagents.
# For this repo (~35k tokens) one full refresh is cheap; for a large
# repo, consider switching the trigger to a weekly schedule.

name: Refresh Codebase Map

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'samples/**'
      - 'global.json'
      - 'Directory.Packages.props'
      - 'Directory.Build.props'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cartographer-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for ANTHROPIC_API_KEY
        id: check-key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set in repo secrets — skipping refresh. See workflow file header for setup instructions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Cartographer
        if: steps.check-key.outputs.skip != 'true'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Run the cartographer skill to update docs/CODEBASE_MAP.md and the
            codebase summary in CLAUDE.md. Only modify those two files.
            Use the existing map as a base and update only sections that
            reflect changed code. Do not invent module structure that isn't
            present in the actual files.

      - name: Open follow-up PR if map changed
        if: steps.check-key.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/refresh-codebase-map
          title: "chore: refresh codebase map"
          commit-message: "Refresh codebase map"
          body: |
            Automated refresh of `docs/CODEBASE_MAP.md` (and `CLAUDE.md` summary)
            after recent changes on `main`.

            Generated by `.github/workflows/refresh-codebase-map.yml`.
          delete-branch: true
          add-paths: |
            docs/CODEBASE_MAP.md
            CLAUDE.md
