<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Code Complexity Analyzer</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />

    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="CodeComplexityAnalyzer.Web.styles.css" rel="stylesheet" /> -->
</head>

<body>
    <script>
        (function() {
            var setting = localStorage.getItem('cca-theme') || 'system';
            var dark = setting === 'dark' || (setting === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        })();
    </script>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="js/download.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
