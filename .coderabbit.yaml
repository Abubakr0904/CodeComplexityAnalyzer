language: en-US
tone_instructions: "Be concise and direct. Focus on substantive issues; skip stylistic nitpicks unless they affect correctness or readability."

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!**/bin/**"
    - "!**/obj/**"
    - "!**/*.Designer.cs"
    - "!samples/**"

chat:
  auto_reply: true
